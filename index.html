    <!-- Loading Screen -->
    <div id="loading-screen">
        <div id="loading-title">Mzu 3D Solar System</div>
        <div id="loading-progress-container">
            <div id="loading-progress-bar"></div>
        </div>
        <div id="loading-text">Initializing Engine...</div>
    </div>

    <div id="info-panel">
        <button class="close-button" onclick="document.getElementById('info-panel').style.display = 'none';">×</button>
        <h3 id="info-title">天体信息</h3>
        <p id="info-name">名称: </p>
        <p id="info-type">类型: </p>
        <p id="info-radius-metric">半径 (公里): </p>

        <p id="info-eccentricity">轨道偏心率: </p>
    </div>
    
    <!-- Background Music -->
    <audio id="background-music" loop preload="auto" playsinline webkit-playsinline crossorigin="anonymous">
